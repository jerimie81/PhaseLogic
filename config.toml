[claude]
model = "claude-sonnet-4-6"

[gemini]
api_key = ""         # fallback: GEMINI_API_KEY env var
model = "gemini-2.0-flash"

[codex]
api_key = ""         # fallback: OPENAI_API_KEY env var or ~/.codex/API-key
model = "gpt-4o"

[ollama]
base_url = "http://localhost:11434"
model = "llama3"

[phases]
# Assign agents to specific phases: claude, gemini, codex, or ollama
spec = "claude"
feasibility = "gemini"
research = "gemini"
architecture = "claude"
coding = "gemini"
testing = "codex"

[orchestration]
timeout_seconds = 120
max_retries = 3
retry_backoff_base = 2.0

[intake]
# How aggressively to interview the user before starting a project.
# 1=minimal (2 questions)  2=light (4)  3=balanced (7, default)
# 4=thorough (11)          5=exhaustive (15)
aggressiveness = 3
