[claude]
model = "claude-sonnet-4-6"

[gemini]
api_key = ""         # fallback: GEMINI_API_KEY env var
model = "gemini-2.0-flash"

[kimi]
api_key = ""         # fallback: KIMI_API_KEY env var
model = "moonshot-v1-32k"
base_url = "https://api.moonshot.ai/v1"

[codex]
api_key = ""         # fallback: OPENAI_API_KEY env var or ~/.codex/API-key
model = "gpt-4o"

[ollama]
base_url = "http://localhost:11434"
model = "llama3"

[phases]
# Assign agents to specific phases: claude, gemini, kimi, codex, or ollama
spec = "claude"
feasibility = "gemini"
research = "gemini"
architecture = "claude"
coding = "gemini"
testing = "codex"

[orchestration]
timeout_seconds = 120
max_retries = 3
retry_backoff_base = 2.0

[sandbox]
enabled = true
required = true
image = "python:3.11-slim"
allow_network = false
memory = "2g"
cpus = "2"
timeout_seconds = 300

[intake]
# How aggressively to interview the user before starting a project.
# 1=minimal (2 questions)  2=light (4)  3=balanced (7, default)
# 4=thorough (11)          5=exhaustive (15)
aggressiveness = 3
